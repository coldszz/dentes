name: Build Laravel for Beget

on:
  push:
    branches: [ main, master ]
  workflow_dispatch:

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Setup PHP
        uses: shivammathur/setup-php@v2
        with:
          php-version: '8.2'
          extensions: mbstring, pdo_mysql, zip, fileinfo

      - name: Create temp directory
        run: mkdir -p /tmp/laravel && chmod 777 /tmp/laravel

      - name: Install Composer dependencies (ignore scripts)
        run: composer install --no-interaction --no-progress --optimize-autoloader --no-dev --no-scripts

      - name: Generate app key and cache config manually
        run: |
          php -r "file_exists('.env') || copy('.env.example', '.env');"
          php artisan key:generate --no-interaction
          php artisan config:cache --no-interaction

      - name: Prepare for Beget
        run: |
          mkdir -p bootstrap/cache
          chmod 755 bootstrap/cache

      - name: Archive project
        run: |
          zip -r dentes-beget.zip . \
            -x '.git/*' '.github/*' 'storage/logs/*' 'storage/framework/sessions/*' 'storage/framework/cache/*'

      - name: Upload artifact
        uses: actions/upload-artifact@v4
        with:
          name: dentes-beget
          path: dentes-beget.zip