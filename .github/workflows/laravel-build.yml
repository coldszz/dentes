name: Build Laravel for Beget

on:
  push:
    branches: [ main, master ]
  workflow_dispatch:

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Setup PHP
        uses: shivammathur/setup-php@v2
        with:
          php-version: '8.2'
          extensions: mbstring, pdo_mysql, zip, fileinfo

      - name: Install Composer dependencies
        run: composer install --no-interaction --no-progress --optimize-autoloader --no-dev

      - name: Generate app key
        run: php artisan key:generate --show

      - name: Prepare for Beget
        run: |
          # Создаём папку для временных файлов
          mkdir -p bootstrap/cache
          chmod 755 bootstrap/cache
          # Создаём заглушку .env для сборки
          cp .env.example .env
          php artisan config:cache

      - name: Archive project
        run: |
          zip -r dentes-beget.zip . \
            -x '.git/*' '.github/*' 'storage/logs/*' 'storage/framework/sessions/*' 'storage/framework/cache/*'

      - name: Upload artifact
        uses: actions/upload-artifact@v4
        with:
          name: dentes-beget
          path: dentes-beget.zip