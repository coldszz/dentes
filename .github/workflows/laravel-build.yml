name: Build Laravel for Beget

on:
  push:
    branches: [ main, master ]
  workflow_dispatch:

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Setup PHP
        uses: shivammathur/setup-php@v2
        with:
          php-version: '8.2'
          extensions: mbstring, pdo_mysql, zip, fileinfo

      - name: Install Composer dependencies (no scripts)
        run: composer install --no-interaction --no-progress --optimize-autoloader --no-dev --no-scripts

      - name: Prepare folder structure for Beget
        run: |
          mkdir -p bootstrap/cache
          mkdir -p storage/framework/sessions
          mkdir -p storage/framework/cache
          mkdir -p storage/framework/views
          mkdir -p storage/logs
          chmod -R 755 bootstrap/cache storage

      - name: Create .env with dummy key
        run: |
          cp .env.example .env 2>/dev/null || echo "APP_KEY=base64:dummykey1234567890" > .env

      - name: Archive project (without running artisan)
        run: |
          zip -r dentes-beget.zip . \
            -x '.git/*' '.github/*' 'storage/logs/*' 'storage/framework/sessions/*' 'storage/framework/cache/*'

      - name: Upload artifact
        uses: actions/upload-artifact@v4
        with:
          name: dentes-beget
          path: dentes-beget.zip